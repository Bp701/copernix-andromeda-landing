<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zgłoszenie szkoły do pilotażu – Copernix OS</title>
  <link rel="icon" type="image/png" href="https://neuroedulabs.onrender.com/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at top left, rgba(56,189,248,0.14) 0, transparent 55%),
                  radial-gradient(circle at bottom right, rgba(139,92,246,0.18) 0, transparent 55%),
                  #020617;
      color: #e2e8f0; font-family: 'Rajdhani', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid rgba(56,189,248,0.15); }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #38bdf8; letter-spacing: 2px; text-decoration: none; }
    .badge { background: rgba(56,189,248,0.12); border: 1px solid #38bdf8; color: #38bdf8; padding: .25rem .75rem; border-radius: 99px; font-size: .75rem; letter-spacing: 1px; }
    .container { max-width: 640px; width: 100%; padding: 3rem 1.5rem; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 4vw, 2.2rem); background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.6rem; }
    .subtitle { color: #94a3b8; font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .limit-badge { display: inline-block; background: rgba(240,171,252,0.12); border: 1px solid #c084fc; color: #c084fc; padding: .3rem 1rem; border-radius: 99px; font-size: .8rem; letter-spacing: 1px; margin-bottom: 2rem; font-weight: bold;}
    form { background: rgba(15,23,42,0.8); border: 1px solid rgba(56,189,248,0.2); border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);}
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: .85rem; color: #94a3b8; letter-spacing: 1px; margin-bottom: .4rem; text-transform: uppercase; font-weight: bold;}
    input, select, textarea { width: 100%; background: rgba(2,6,23,0.6); border: 1px solid rgba(56,189,248,0.25); border-radius: 8px; padding: .8rem 1rem; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; font-size: 1rem; transition: border-color .2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.2);}
    select option { background: #0f172a; color: #e2e8f0; }
    textarea { resize: vertical; min-height: 100px; }
    .btn-submit { width: 100%; padding: 1rem; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; border: none; transition: 0.25s; margin-top: 1rem; box-shadow: 0 5px 15px rgba(6,182,212,0.3);}
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(6,182,212,0.5); }
    .back-link { display: inline-block; margin-top: 1.5rem; color: #38bdf8; text-decoration: none; font-size: .9rem; letter-spacing: 1px; text-align: center; width: 100%;}
    .back-link:hover { color: #fff; }
    footer { text-align: center; padding: 2rem; color: #64748b; font-size: .8rem; border-top: 1px solid rgba(56,189,248,0.08); width: 100%; margin-top: auto; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">COPERNIX OS</a>
    <span class="badge">PROGRAM PILOTAŻOWY</span>
  </header>
  <div class="container">
    <h1>Zgłoszenie szkoły do pilotażu</h1>
    <p class="subtitle">Wdróż lokalne środowisko Edge AI dla dzieci ze SPE w swojej placówce.</p>
    <span class="limit-badge">STATUS REKRUTACJI: OTWARTE (LIMIT: 10 SZKÓŁ)</span>
    
    <form action="https://formspree.io/f/mgolnybo" method="POST">
      <div class="form-group">
        <label for="school_name">Pełna nazwa szkoły / placówki *</label>
        <input type="text" id="school_name" name="school_name" required>
      </div>
      <div class="form-group">
        <label for="city">Miasto *</label>
        <input type="text" id="city" name="city" required>
      </div>
      <div class="form-group">
        <label for="school_type">Typ placówki *</label>
        <select id="school_type" name="school_type" required>
          <option value="" disabled selected>Wybierz z listy...</option>
          <option value="szkola_podstawowa">Szkoła Podstawowa</option>
          <option value="szkola_specjalna">Szkoła Specjalna</option>
          <option value="osrodek_spe">Ośrodek Wychowawczy / Rewalidacyjny</option>
          <option value="poradnia">Poradnia Psychologiczno-Pedagogiczna</option>
          <option value="inne">Inne</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contact_person">Imię i nazwisko osoby kontaktowej *</label>
        <input type="text" id="contact_person" name="contact_person" required>
      </div>
      <div class="form-group">
        <label for="role">Stanowisko *</label>
        <input type="text" id="role" name="role" placeholder="np. Dyrektor, Nauczyciel wspomagający" required>
      </div>
      <div class="form-group">
        <label for="email">Służbowy adres e-mail *</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="students_count">Szacowana liczba uczniów z orzeczeniami</label>
        <input type="number" id="students_count" name="students_count" min="1">
      </div>
      <div class="form-group">
        <label for="message">Dodatkowe informacje (opcjonalnie)</label>
        <textarea id="message" name="message" placeholder="Z jakimi wyzwaniami edukacyjnymi mierzy się Państwa placówka?"></textarea>
      </div>
      <button type="submit" class="btn-submit">WYŚLIJ ZGŁOSZENIE DO PILOTAŻU</button>
    </form>
    <a href="index.html" class="back-link">← Wróć do strony głównej</a>
  </div>
  <footer>
    <p>&copy; 2026 NeuroEduLabs sp. z o.o. · Copernix OS</p>
  </footer>
</body>
</html>
